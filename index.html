<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>집좀봐조 인터랙티브 프로토타입 - Navy Mint Theme</title>
  <style>
    :root{
      --main:#131337;
      --main-dark:#0B0B24;
      --bg:#F7F9FC;
      --sub:#E7FFF8;
      --accent:#77F3D3;
      --text:#171A2F;
      --muted:#6B7280;
      --line:#D9E1EC;
      --card:#FFFFFF;
      --danger:#E84D5B;
      --warning:#F6C343;
      --ok:#15B88F;
      --shadow:0 18px 50px rgba(19,19,55,.16);
      --radius:24px;
      --safe-bottom:22px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Pretendard,"Noto Sans KR",sans-serif;color:var(--text);background:#101429}
    button,input,textarea,select{font-family:inherit}
    button{border:0;background:none;color:inherit;cursor:pointer}
    .stage{min-height:100vh;display:flex;justify-content:center;align-items:center;padding:28px;gap:28px}
    .phone{width:390px;height:844px;background:var(--bg);border-radius:40px;box-shadow:0 30px 80px rgba(0,0,0,.32);overflow:hidden;position:relative;border:10px solid #090B1F}
    .screen{position:absolute;inset:0;background:var(--bg);display:flex;flex-direction:column;overflow:hidden}
    .status{height:34px;display:flex;align-items:center;justify-content:space-between;padding:12px 22px 0;font-size:12px;font-weight:800;letter-spacing:.01em;flex:0 0 auto;background:var(--bg);z-index:2}
    .status .icons{display:flex;gap:4px;align-items:center;font-size:12px}
    .header{height:56px;display:flex;align-items:center;padding:4px 18px;gap:10px;flex:0 0 auto;background:var(--bg);z-index:2}
    .header .back{width:36px;height:36px;border-radius:18px;display:grid;place-items:center;font-size:22px}
    .header .back:hover{background:rgba(19,19,55,.10)}
    .header .titles{flex:1;min-width:0}
    .header h1{margin:0;font-size:20px;line-height:1.1;font-weight:900;letter-spacing:-.03em}
    .header p{margin:2px 0 0;font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .header .right{display:flex;gap:8px;align-items:center}
    .content{flex:1;overflow:auto;padding:8px 18px 104px;scrollbar-width:none}
    .content::-webkit-scrollbar{display:none}
    .bottom{height:74px;background:#fff;position:absolute;left:0;right:0;bottom:0;border-top:1px solid var(--line);display:flex;z-index:10;padding-bottom:var(--safe-bottom)}
    .tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:11px;font-weight:800;color:#8B95A7;position:relative}
    .tab.active{color:var(--main)}
    .tab .ico{font-size:20px;line-height:1}
    .fab{position:absolute;left:50%;right:auto;bottom:48px;width:58px;height:58px;background:var(--main);color:white;border-radius:29px;box-shadow:0 14px 28px rgba(19,19,55,.26);display:grid;place-items:center;font-size:32px;z-index:12;border:5px solid var(--bg);transform:translateX(-50%)}
    .help-fab{position:absolute;right:16px;bottom:84px;width:50px;height:50px;border-radius:50%;background:#fff;color:#8B95A7;border:1.5px solid var(--line);box-shadow:0 12px 28px rgba(19,19,55,.16);display:grid;place-items:center;font-size:24px;font-weight:950;z-index:13}
    .help-fab:hover{color:var(--main);border-color:var(--main)}
    .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:0 8px 22px rgba(19,19,55,.05);padding:18px;margin-bottom:14px}
    .soft{background:var(--sub);border-color:transparent}
    .accent-card{background:#E9FFF9;border-color:#A7F7E4}
    .row{display:flex;align-items:center;gap:10px}.between{justify-content:space-between}.start{align-items:flex-start}
    .pill{display:inline-flex;align-items:center;gap:4px;padding:7px 11px;border-radius:999px;background:#EEF2F7;border:1px solid var(--line);font-size:12px;font-weight:800;color:#4B5563;white-space:nowrap}
    .pill.main{background:var(--main);color:#fff;border-color:var(--main)}.pill.ok{background:#E7FFF8;color:var(--ok);border-color:#BDF7EA}.pill.warn{background:#FFF7D6;color:#8A6400;border-color:#FEE7A6}.pill.danger{background:#FFECEF;color:var(--danger);border-color:#FFC8D0}
    .btn{height:48px;border-radius:16px;background:var(--main);color:#fff;font-weight:900;font-size:15px;width:100%;box-shadow:0 10px 18px rgba(119,243,211,.26)}
    .btn.secondary{background:#fff;color:var(--text);border:1px solid var(--line);box-shadow:none}.btn.ghost{background:transparent;color:var(--main);box-shadow:none}.btn.warn{background:var(--accent);color:#111827}.btn.danger{background:var(--danger)}
    .btn.small{height:34px;border-radius:12px;font-size:12px;width:auto;padding:0 14px;box-shadow:none}.btn.inline{width:auto;padding:0 16px}
    .field{width:100%;height:46px;border:1px solid var(--line);background:#fff;border-radius:14px;padding:0 14px;font-size:14px;outline:none}.field:focus{border-color:var(--main);box-shadow:0 0 0 4px rgba(19,19,55,.10)}textarea.field{height:110px;padding:12px 14px;resize:none;line-height:1.45}
    .label{font-size:12px;font-weight:900;margin:12px 0 7px;color:#4F4B43}.hint{font-size:12px;color:var(--muted);line-height:1.5}.h2{font-size:22px;font-weight:950;letter-spacing:-.04em;margin:0}.h3{font-size:17px;font-weight:900;letter-spacing:-.02em;margin:0}.caption{font-size:12px;color:var(--muted)}
    .logo{width:54px;height:54px;border-radius:18px;background:var(--sub);display:grid;place-items:center;font-size:30px;border:1px solid #BDF7EA}.brand{font-size:27px;font-weight:950;letter-spacing:-.05em}.seg{display:flex;padding:4px;background:#EEF2F7;border:1px solid var(--line);border-radius:999px;gap:3px}.seg button{flex:1;height:34px;border-radius:999px;font-size:13px;font-weight:900;color:#6B7280}.seg button.active{background:#fff;color:var(--main);box-shadow:0 4px 12px rgba(0,0,0,.06)}
    .progress{height:12px;background:#E7ECF3;border-radius:99px;overflow:hidden}.bar{height:100%;background:linear-gradient(90deg,var(--main),#77F3D3);border-radius:99px;transition:.35s}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .room-map{height:186px;border-radius:22px;background:#fff;border:1px solid var(--line);position:relative;overflow:hidden;padding:14px}.room{position:absolute;border:2px solid #3F4656;background:#FFFFFF;display:grid;place-items:center;font-weight:900;font-size:13px}.room.living{right:14px;bottom:20px;width:154px;height:80px}.room.kitchen{left:56px;bottom:20px;width:94px;height:60px}.room.bath{right:14px;top:22px;width:70px;height:55px}.room.entry{left:16px;top:22px;width:88px;height:48px}.pin{position:absolute;width:22px;height:22px;border-radius:50%;background:var(--danger);color:#fff;display:grid;place-items:center;font-size:12px;border:3px solid #fff;box-shadow:0 4px 12px rgba(0,0,0,.18);z-index:2}.pin.blue{background:#4267C8}.pin.green{background:var(--main)}.pin.big{width:28px;height:28px}
    .photo-strip{height:142px;display:grid;grid-template-columns:1fr 1fr;gap:8px}.photo{border-radius:18px;background:linear-gradient(135deg,#E5EAF2,#F7F9FC);border:1px solid var(--line);position:relative;overflow:hidden}.photo:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 20% 22%,rgba(255,255,255,.88) 0 18%,transparent 19%),linear-gradient(120deg,transparent 0 42%,rgba(119,243,211,.22) 43% 56%,transparent 57%),linear-gradient(180deg,rgba(0,0,0,0) 0 70%,rgba(0,0,0,.12))}.photo .label{position:absolute;left:10px;bottom:8px;margin:0;background:rgba(255,255,255,.86);border-radius:999px;padding:5px 8px;font-size:11px}.record-card{display:flex;gap:12px;align-items:center;padding:12px;border-radius:18px;background:#fff;border:1px solid var(--line);margin-bottom:10px}.thumb{width:68px;height:68px;border-radius:16px;background:#E5EAF2;position:relative;overflow:hidden;flex:0 0 auto}.thumb:after{content:"";position:absolute;inset:14px;border-radius:11px;background:rgba(119,243,211,.26)}.record-card h4{font-size:15px;margin:0 0 4px;font-weight:950;letter-spacing:-.02em}.record-card p{font-size:12px;color:#667085;margin:0 0 4px;line-height:1.3}.record-card .date{font-size:11px;color:#9AA3B2}
    .record-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.record-tile{background:#fff;border:1px solid var(--line);border-radius:20px;padding:9px}.record-tile .thumb{width:100%;height:98px;margin-bottom:8px}.record-tile h4{font-size:14px;margin:0 0 4px;font-weight:950}.record-tile p{font-size:11px;color:#6B7280;margin:0;line-height:1.3}.divider{height:1px;background:var(--line);margin:14px 0}.link-row{height:56px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;font-weight:900}.empty{min-height:180px;border:1.5px dashed #CBD5E1;border-radius:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:#6B7280;background:rgba(255,255,255,.55);padding:20px}.badge{width:86px;height:86px;border-radius:28px;background:linear-gradient(145deg,var(--accent),#B7FFEE);display:grid;place-items:center;font-size:38px;box-shadow:0 12px 26px rgba(119,243,211,.35)}
    .sheet,.modal-wrap{position:absolute;inset:0;display:none;z-index:50}.sheet.on,.modal-wrap.on{display:block}.dim{position:absolute;inset:0;background:rgba(0,0,0,.38);backdrop-filter:blur(2px)}.modal{position:absolute;left:24px;right:24px;top:50%;transform:translateY(-50%);background:#fff;border-radius:26px;padding:22px;border:1px solid var(--line);box-shadow:var(--shadow);animation:pop .18s ease-out}.bottom-sheet{position:absolute;left:0;right:0;bottom:0;background:#fff;border-radius:30px 30px 0 0;padding:22px 18px 34px;box-shadow:0 -18px 40px rgba(0,0,0,.18);animation:slide .2s ease-out}.toast{position:absolute;left:22px;right:22px;bottom:92px;background:rgba(19,19,55,.94);color:#fff;border-radius:18px;padding:14px 16px;font-size:13px;font-weight:800;z-index:90;display:none;box-shadow:0 12px 24px rgba(0,0,0,.2)}.toast.on{display:block;animation:toast .2s ease-out}

    .space-photo-title{font-size:12px;font-weight:900;color:var(--muted);margin:2px 0 8px}
    .record-space-photo{height:170px;margin-bottom:10px;cursor:pointer}
    .record-space-photo .pin.big{transform:translate(-50%,-50%)}
    .normal-detail{display:grid;grid-template-columns:112px 1fr;gap:14px;align-items:start}
    .normal-detail-photo{height:118px;border-radius:18px;background:linear-gradient(135deg,#E5EAF1,#FFFFFF 46%,#CBD5E1);border:1px solid var(--line);position:relative;overflow:hidden}
    .normal-detail-photo:before{content:"";position:absolute;inset:0;background:linear-gradient(135deg,transparent 0 46%,rgba(19,19,55,.14) 47%,rgba(19,19,55,.14) 49%,transparent 50%),linear-gradient(45deg,transparent 0 47%,rgba(19,19,55,.14) 48%,rgba(19,19,55,.14) 50%,transparent 51%)}
    .normal-check-list{margin:10px 0 0;padding:0;list-style:none;font-size:13px;color:var(--text);line-height:1.7;font-weight:700}
    .normal-check-list li:before{content:"✓";font-weight:950;color:var(--main);margin-right:8px}
    @keyframes pop{from{opacity:0;transform:translateY(-46%) scale(.96)}to{opacity:1;transform:translateY(-50%) scale(1)}}@keyframes slide{from{transform:translateY(24px);opacity:.7}to{transform:translateY(0);opacity:1}}@keyframes toast{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
    .route{animation:fade .18s ease-out}@keyframes fade{from{opacity:.65;transform:translateX(6px)}to{opacity:1;transform:none}}
    .pay-option,.house-option,.option-row{height:58px;border:1px solid var(--line);border-radius:18px;background:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 14px;margin-bottom:10px;font-weight:900}.pay-option.active{border-color:var(--main);box-shadow:0 0 0 4px rgba(19,19,55,.10)}.check{width:24px;height:24px;border-radius:50%;border:2px solid #CAD3DF;display:grid;place-items:center}.active .check,.check.on{border-color:var(--main);background:var(--main);color:#fff}.switch{width:48px;height:28px;border-radius:14px;background:#CBD5E1;position:relative;transition:.2s}.switch:after{content:"";position:absolute;width:22px;height:22px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}.switch.on{background:var(--main)}.switch.on:after{left:23px}.notice{font-size:12px;line-height:1.45;background:#F1F5F9;border:1px solid var(--line);border-radius:16px;padding:12px;color:#4B5563}.mini-map{height:220px;border:1px solid var(--line);border-radius:22px;background:#fff;position:relative;overflow:hidden}.dot-choice{position:absolute;left:46%;top:42%;width:26px;height:26px;border-radius:50%;background:var(--danger);border:4px solid white;box-shadow:0 8px 18px rgba(0,0,0,.2)}

    .entry-photo-stage{height:190px;border-radius:22px;background:#FFFFFF;border:1px solid var(--line);position:relative;overflow:hidden;display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:8px}
    .entry-photo-stage.empty{display:flex;align-items:center;justify-content:center;text-align:center;border:1.5px dashed #AEB8C6;background:#F8FAFC}
    .entry-photo-real{border-radius:18px;background:linear-gradient(135deg,#E2E8F0,#FFFFFF 42%,#CBD5E1);position:relative;overflow:hidden;border:1px solid var(--line)}
    .entry-photo-real:before{content:"";position:absolute;left:18%;top:18%;width:64%;height:64%;border-radius:14px;background:linear-gradient(180deg,rgba(19,19,55,.10),rgba(119,243,211,.20));box-shadow:inset 0 0 0 1px rgba(19,19,55,.12)}
    .entry-photo-real:after{content:"";position:absolute;right:16px;top:16px;width:20px;height:20px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 4px rgba(255,255,255,.85)}

    .pin-select-stage{height:250px;border-radius:22px;background:#fff;border:1.5px solid var(--main);position:relative;overflow:hidden;display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:6px;cursor:crosshair;margin-top:12px}
    .pin-select-stage .entry-photo-real{border-radius:18px}
    .pin-select-stage .pin{pointer-events:none;transform:translate(-50%,-50%)}
    .pin-guide-copy{font-size:13px;line-height:1.5;color:var(--muted);margin:8px 0 0;text-align:center}
    .mission-card{background:#fff;border:1.4px solid var(--main);border-radius:22px;padding:18px;margin-bottom:12px;box-shadow:0 10px 24px rgba(19,19,55,.08);position:relative;overflow:hidden}
    .mission-card.clickable{cursor:pointer}
    .mission-card.clickable:active{transform:scale(.99)}
    .mission-step{display:inline-flex;align-items:center;justify-content:center;min-width:46px;height:24px;padding:0 10px;border-radius:999px;background:#F8FAFC;border:1px solid var(--line);font-size:11px;font-weight:950;color:var(--main)}
    .mission-title{font-size:18px;font-weight:950;line-height:1.25;letter-spacing:-.04em;margin:10px 0 6px;color:var(--main)}
    .mission-desc{font-size:12px;line-height:1.45;color:var(--muted);margin:0}
    .mission-thumb{width:72px;height:72px;border-radius:18px;background:linear-gradient(135deg,#E2E8F0,#FFFFFF 50%,#C7D2FE);border:1px solid var(--line);display:grid;place-items:center;font-size:28px;flex:0 0 auto}
    .option-chip-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
    .option-chip-select{height:48px;border:1.3px solid var(--line);border-radius:16px;background:#fff;font-weight:950;color:var(--main);display:flex;align-items:center;justify-content:center;gap:6px}
    .option-chip-select.active{border-color:var(--main);box-shadow:0 0 0 4px rgba(119,243,211,.20);background:#F1FFFB}.option-chip-select.disabled{color:#AEB8C6;background:#F8FAFC;border-style:dashed}
    .mission-list-card{border:1px solid var(--line);background:#fff;border-radius:20px;padding:14px;margin-bottom:10px}
    .mission-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
    .entry-complete-blank{min-height:210px;border:1.5px dashed #AEB8C6;border-radius:24px;background:#F8FAFC;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:22px;color:var(--muted)}

    .side-note{width:320px;color:#fff;line-height:1.6}.side-note h2{font-size:24px;margin:0 0 10px}.side-note p{font-size:14px;color:#E5E7EB;margin:0 0 14px}.side-note .legend{font-size:13px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);padding:14px;border-radius:18px}.desktop-only{display:block}@media(max-width:850px){.stage{padding:0;background:#090B1F}.phone{width:100vw;height:100vh;border-radius:0;border:0}.desktop-only{display:none}.stage{align-items:stretch}.content{padding-bottom:106px}}

    .structure-space-row{display:flex;gap:6px;align-items:center;overflow-x:auto;white-space:nowrap;padding:2px 0 6px;scrollbar-width:none}
    .structure-space-row::-webkit-scrollbar{display:none}
    .space-chip{height:38px;padding:0 12px;border:1.5px solid var(--primary-900, var(--main));border-radius:20px;background:#fff;font-size:13px;font-weight:950;color:var(--primary-900, var(--main));display:inline-flex;align-items:center;justify-content:center;flex:0 0 auto}
    .space-chip.add{width:38px;padding:0;border-radius:50%;font-size:20px;line-height:1}
    .structure-map-card{height:308px;border:0;border-radius:0;background:#fff;position:relative;margin-top:28px;overflow:hidden}
    .structure-map-menu{display:none}
    .structure-room{position:absolute;background:#fff;border:2.4px solid #111827;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:950;color:#000;letter-spacing:-.05em}
    .structure-room.entry{left:20px;bottom:32px;width:118px;height:112px}
    .structure-room.living{left:138px;bottom:32px;width:190px;height:180px;font-size:27px}
    .structure-room.bath{left:248px;top:16px;width:80px;height:74px;font-size:20px}
    .structure-line{position:absolute;background:var(--primary-900, var(--main));height:1.8px;transform-origin:left center}
    .structure-node{position:absolute;width:8px;height:8px;border-radius:50%;background:var(--primary-900, var(--main));box-shadow:0 0 0 2px #fff;z-index:2}
    .structure-confirm-copy{text-align:center;font-weight:950;font-size:16px;line-height:1.45;color:var(--primary-900, var(--main));margin:8px 0 14px}
    .structure-confirm-list{text-align:center;font-size:13px;font-weight:900;color:var(--cool-gray-700, #4B5563);text-decoration:underline;margin:0 0 18px}

    .home-summary{display:grid;grid-template-columns:1fr 1fr 1fr 92px;gap:8px;align-items:center;text-align:center;padding:18px 14px}
    .home-summary b{display:block;font-size:23px;font-weight:950;letter-spacing:-.03em;margin-top:6px;color:var(--primary, var(--text))}
    .home-summary .summary-label{font-size:15px;font-weight:950;color:var(--text)}
    .home-crown{display:flex;flex-direction:column;align-items:center;gap:6px;font-size:12px;font-weight:950;color:var(--text)}
    .home-crown .crown-icon{font-size:48px;line-height:1}
    .home-structure-card{padding:16px 14px 14px}
    .home-map{height:220px;border-radius:22px;background:#fff;border:1px solid var(--line);position:relative;overflow:hidden;margin-top:12px;padding:0}
    .home-plan-room{position:absolute;border:2.5px solid var(--text);background:#fff;color:var(--text);font-weight:950;font-size:20px;letter-spacing:-.05em;display:grid;place-items:center;cursor:pointer;transition:.16s}
    .home-plan-room:hover{background:rgba(119,243,211,.22);box-shadow:inset 0 0 0 999px rgba(119,243,211,.08)}
    .home-plan-entry{left:10px;bottom:30px;width:112px;height:76px}
    .home-plan-living{left:122px;bottom:30px;width:184px;height:120px;font-size:23px}
    .home-plan-bath{left:224px;top:12px;width:82px;height:58px;font-size:16px}
    .home-plan-room span{position:relative;z-index:3}
    .home-space-pop{border:1px solid var(--line);border-radius:22px;padding:18px;background:#fff;cursor:pointer;transition:.16s}
    .home-space-pop:hover{transform:translateY(-1px);box-shadow:0 10px 24px rgba(19,19,55,.12)}
    .home-space-counts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:14px;text-align:center}
    .home-space-counts div{border-radius:16px;background:#F4F6FA;padding:12px 6px;font-weight:950}
    .home-space-counts span{display:block;font-size:11px;color:var(--muted);margin-bottom:4px}


    .pin-legend{display:flex;align-items:center;gap:10px;margin:8px 2px 10px;color:#5B6474;font-size:12px;font-weight:900}
    .pin-legend span{display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
    .legend-dot{width:10px;height:10px;border-radius:50%;display:inline-block;border:2px solid #fff;box-shadow:0 2px 6px rgba(19,19,55,.18)}
    .legend-dot.defect{background:#4267C8}.legend-dot.repair{background:var(--danger)}

function closeOverlay(){ $('modal').className='modal-wrap'; $('modal').innerHTML=''; $('sheet').className='sheet'; $('sheet').innerHTML=''; }
function modal(title, body, actions=''){
  $('modal').innerHTML = `<div class="dim" onclick="closeOverlay()"></div><div class="modal"><h3 class="h3">${title}</h3><div style="height:10px"></div>${body}<div style="height:16px"></div>${actions}</div>`;
  $('modal').classList.add('on');
}
function sheet(title, body){
  $('sheet').innerHTML = `<div class="dim" onclick="closeOverlay()"></div><div class="bottom-sheet"><div class="row between"><h3 class="h3">${title}</h3><button class="pill" onclick="closeOverlay()">닫기</button></div><div style="height:14px"></div>${body}</div>`;
  $('sheet').classList.add('on');
}
function status(){return `<div class="status"><span>9:41</span><span class="icons">●●●  5G  ▰</span></div>`}
function header(title, sub='', back=true, right=''){
  return `<div class="header">${back?`<button class="back" onclick="historyBack()">‹</button>`:''}<div class="titles"><h1>${title}</h1>${sub?`<p>${sub}</p>`:''}</div><div class="right">${right}</div></div>`
}
function bottom(){
  return `<nav class="bottom"><button class="tab ${state.tab==='home'?'active':''}" onclick="goTab('home')"><span class="ico">⌂</span>홈</button><button class="tab ${state.tab==='records'?'active':''}" onclick="goTab('records')"><span class="ico">☷</span>기록</button><button class="tab ${state.tab==='my'?'active':''}" onclick="goTab('my')"><span class="ico">●</span>마이</button></nav><button class="fab" onclick="openFab()">+</button><button class="help-fab" onclick="setRoute('pointGuide',{pointGuideSlide:0})">?</button>`
}
function layout(title, sub, content, opts={}){
  return `${status()}${header(title,sub,opts.back!==false,opts.right||'')}<main class="content route">${content}</main>${opts.nav===false?'':bottom()}`
}
function historyBack(){
  closeOverlay();
  const prev = (state.navStack||[]).pop();
  if(prev){
    Object.assign(state, prev);
    render();
    return;
  }
  if(state.route==='login' || state.route==='home') return;
  if(['register','loginEmail','forgot','changePw','terms','permission','guide'].includes(state.route)) return replaceRoute('login');
  replaceRoute('home',{tab:'home'});
}
function openFab(){
  setRoute('write',{writeType:'하자',writeStatus:'미처리',fromEntryMission:false,selectedSpace:state.selectedSpace||'현관'});
}
function openPhotoSheet(){
  sheet('사진 추가', `
    <button class="option-row" onclick="closeOverlay();setRoute('camera')"><span>📷 카메라로 찍기</span><b>›</b></button>
    <button class="option-row" onclick="closeOverlay();showToast('앨범에서 사진 2장을 추가했어요')"><span>🖼️ 앨범에서 선택</span><b>›</b></button>
  `)
}
function badgeFor(status){
  if(status==='처리완료'||status==='문제없음')return `<span class="pill ok">${status}</span>`;
  if(status==='요청완료')return `<span class="pill warn">${status}</span>`;
  if(status==='미처리')return `<span class="pill danger">${status}</span>`;
  return `<span class="pill">${status}</span>`;
}
function recordsForCurrent(){
  return records.filter(r=>r.space===state.selectedSpace && (state.recordType==='전체'||r.type===state.recordType) && (state.recordType!=='수리'||state.repairFilter==='전체'||(state.repairFilter==='진행중'?['미처리','요청완료'].includes(r.status):r.status==='처리완료')));
}

  const route=state.route;

  if(route==='loginEmail') app.innerHTML = renderEmailLogin();
  if(route==='forgot') app.innerHTML = renderForgot();
  if(route==='changePw') app.innerHTML = renderChangePw();
  if(route==='terms') app.innerHTML = renderTerms();
  if(route==='permission') app.innerHTML = renderPermission();
  if(route==='guide') app.innerHTML = renderGuide();
  if(route==='houseForm') app.innerHTML = renderHouseForm();
  if(route==='structureForm') app.innerHTML = renderStructureForm();
  if(route==='home') app.innerHTML = renderHome();
  if(route==='tip') app.innerHTML = renderTip();
  if(route==='badges') app.innerHTML = renderBadges();
  if(route==='checklist') app.innerHTML = renderChecklist();
  if(route==='records') app.innerHTML = renderRecords();
  if(route==='recordDetail') app.innerHTML = renderRecordDetail();
  if(route==='write') app.innerHTML = renderWrite();
  if(route==='messageDraft') app.innerHTML = renderMessageDraft();
  if(route==='legal') app.innerHTML = renderLegal();
  if(route==='payment') app.innerHTML = renderPayment();
  if(route==='pointGuide') app.innerHTML = renderPointGuide();
  if(route==='my') app.innerHTML = renderMy();
  if(route==='mySub') app.innerHTML = renderMySub();
  if(route==='moveoutGuide') app.innerHTML = renderMoveoutGuide();
  if(route==='camera') app.innerHTML = renderCamera();
}

function openDropdown(title, items, key){
  const current = key ? state[key] : '';
  sheet(title, items.map(item=>`<button class="option-row" onclick="selectDropdownValue('${key}','${item}')"><span>${item}</span><span class="check ${current===item?'on':''}">${current===item?'✓':''}</span></button>`).join(''));
}
function selectDropdownValue(key,value){
  if(key) state[key]=value;
  closeOverlay();
  showToast(`${value} 선택`);
  render();
}

    checks:t.slice(1),
    date:'2026.06.04',

    missionName:name,
    pin:null
  });

function renderSpacePhotoArea(){
  if(state.selectedSpace==='현관' && (state.entryPhotoCount||0)>=2){
    const pins = (state.entryPhotoPins||[]).map(p=>`<span class="pin big${p.type==='하자'?' blue':''}" style="left:${p.x}%;top:${p.y}%">!</span>`).join('');
    return `<div class="entry-photo-stage record-space-photo" onclick="openImageView()"><div class="entry-photo-real real-photo entry-full-1"><span class="label"></span></div><div class="entry-photo-real real-photo entry-full-2"><span class="label"></span></div>${pins}</div>`;
  }
  return `<div class="photo-strip" style="height:132px"><div class="photo" onclick="openImageView()"><span class="label">${state.selectedSpace} 사진</span>${records.filter(r=>r.space===state.selectedSpace && r.pin).map((r,i)=>`<span class="pin ${r.type==='하자'?'blue':''}" style="left:${r.pin.x||20+i*28}%;top:${r.pin.y||34+i*10}%">!</span>`).join('')}</div><div class="photo"><span class="label">다른 각도</span></div></div>`;
}
function openRecordById(id){
  const r = records.find(x=>x.id===id);
  if(!r) return;
  state.selectedRecord=id;
  if(r.type==='정상'){
    showNormalRecordSheet(id);
    return;
  }
  setRoute('recordDetail');
}
function showNormalRecordSheet(id){
  const r = records.find(x=>x.id===id);
  if(!r) return;
  const checks = r.checks || normalRecordText(r.missionName||r.title).slice(1);
  sheet(r.title, `<div class="normal-detail"><div class="normal-icon-photo">${normalRecordIcon(r.missionName||r.title)}</div><div><div class="row" style="gap:6px;margin-bottom:8px"><span class="pill ok">정상</span><span class="pill">사진 권장</span></div><p class="hint" style="margin:0">${r.desc}</p><p class="caption" style="margin:6px 0 0">${r.date}</p></div></div><ul class="normal-check-list">${checks.map(c=>`<li>${c}</li>`).join('')}</ul>`);
}
function pinLegendHtml(){
  return `<div class="pin-legend"><span><i class="legend-dot defect"></i>파란 핀 = 하자</span><span><i class="legend-dot repair"></i>빨간 핀 = 수리</span></div>`;
}

function normalRecordIcon(name){
  if((name||'').includes('현관문')) return '🚪';
  if((name||'').includes('신발장')) return '🚪';
  if((name||'').includes('장식장')) return '🚪';
  return '🏠';
}
function imageClassForRecord(r){
  if(!r) return '';
  if(r.imageClass) return r.imageClass;
  const target = `${r.title||''} ${r.detailSpace||''} ${r.desc||''}`;
  if(target.includes('도어락')) return 'doorlock-photo';
  if(target.includes('현관문 하단') || target.includes('긁힘') || target.includes('찍힘')) return 'door-bottom-photo';
  return '';
}
function writePhotoClass(defaults, type, isEntry){
  const target = `${defaults.title||''} ${defaults.detail||''} ${defaults.imageLabel||''}`;
  if(isEntry || target.includes('도어락')) return 'real-photo doorlock-photo';
  if(target.includes('현관문 하단') || target.includes('현관문 사진') || target.includes('긁힘') || target.includes('찍힘')) return 'real-photo door-bottom-photo';
  return '';
}
function detailPhotoClass(r){
  const cls = imageClassForRecord(r);
  return cls ? `real-photo ${cls}` : '';
}
function renderRecordThumb(r){
  if(r && r.type==='정상') return `<div class="normal-thumb">${normalRecordIcon(r.missionName||r.title)}</div>`;
  const cls = imageClassForRecord(r);
  return `<div class="thumb${cls?` real-photo ${cls}`:''}"></div>`;
}

  state.tab='records';
  if(state.selectedSpace==='현관' && !state.entryGuideCompleted && ['photoMission','optionMission','missions','missionsDone'].includes(state.entryFlowStep)){

  const list=recordsForCurrent();
  return layout('공간 기록',`${houses[state.selectedHouse].name}`,`
    <div class="seg">${spaces.map(s=>`<button class="${state.selectedSpace===s?'active':''}" onclick="setRoute('records',{selectedSpace:'${s}'})">${s}</button>`).join('')}</div><div style="height:12px"></div>
    ${renderSpacePhotoArea()}${pinLegendHtml()}<div style="height:10px"></div><button class="btn secondary" onclick="setRoute('write',{writeType:'하자',writeStatus:'미처리',fromEntryMission:false})">+ 하자/수리 기록 추가</button>
    <div style="height:12px"></div><div class="seg"><button class="${state.recordType==='하자'?'active':''}" onclick="state.recordType='하자';render()">하자</button><button class="${state.recordType==='수리'?'active':''}" onclick="state.recordType='수리';render()">수리</button><button class="${state.recordType==='정상'?'active':''}" onclick="state.recordType='정상';render()">정상 기록</button></div>
    ${state.recordType==='수리'?`<div style="height:10px"></div><div class="seg"><button class="${state.repairFilter==='전체'?'active':''}" onclick="state.repairFilter='전체';render()">전체</button><button class="${state.repairFilter==='진행중'?'active':''}" onclick="state.repairFilter='진행중';render()">진행중</button><button class="${state.repairFilter==='완료'?'active':''}" onclick="state.repairFilter='완료';render()">완료</button></div>`:''}
    <div style="height:10px"></div><div class="row"><input class="field" style="height:42px" placeholder="제목을 검색하세요"><button class="pill" onclick="state.recordView=state.recordView==='list'?'card':'list';render()">${state.recordView==='list'?'리스트형':'카드형'}</button></div><div style="height:12px"></div>

  `)
}
function openImageView(){
  const pins = state.selectedSpace==='현관' ? (state.entryPhotoPins||[]).map(p=>`<span class="pin big${p.type==='하자'?' blue':''}" style="left:${p.x}%;top:${p.y}%">!</span>`).join('') : '';

function formatDetailContent(text){

function memoListForRecord(r){
  if(!state.recordMemos) state.recordMemos={};
  const extra = state.recordMemos[r.id] || [];
  return [...defaultMemoListForRecord(r), ...extra];
}
function renderMemoSection(r){
  const memos = memoListForRecord(r);
  return `<section class="memo-section">
    <div class="row between"><h3 class="h3">메모</h3><span class="pill">${memos.length}개</span></div>
    ${memos.map(m=>`<div class="memo-card"><div class="memo-avatar">나</div><div><div class="memo-meta">나 · ${m.date}</div><div class="memo-body">${m.text}</div></div><button class="memo-more">⋮</button></div>`).join('')}

  </section>`;
}
function addMemoToRecord(){
  const r=records.find(x=>x.id===state.selectedRecord)||records[0];
  const input=document.getElementById('memoInput');
  const text=(input&&input.value.trim())||'수리 기사 방문 후 처리 결과 추가 기록 예정';
  if(!state.recordMemos) state.recordMemos={};
  if(!state.recordMemos[r.id]) state.recordMemos[r.id]=[];
  state.recordMemos[r.id].push({date:'2026.06.08 10:00', text});
  showToast('메모를 추가했어요');
  render();
}

function openStatusDropdown(){
  const r=records.find(x=>x.id===state.selectedRecord)||records[0];
  if(!r || r.type!=='수리'){
    showToast('정상/하자 기록은 상태 변경이 필요 없어요');
    return;
  }
  sheet('처리 상태 변경', ['미처리','요청완료','처리완료'].map(s=>`<button class="option-row" onclick="changeRecordStatus('${s}')"><span>${s}</span><span class="check ${r.status===s?'on':''}">${r.status===s?'✓':''}</span></button>`).join(''));
}
function changeRecordStatus(status){
  const r=records.find(x=>x.id===state.selectedRecord);
  if(r) r.status=status;
  closeOverlay();
  showToast(`처리 상태가 ${status}(으)로 변경됐어요`);
  render();
}
function confirmDeleteRecord(){modal('기록을 삭제할까요?','<p class=hint>분쟁 대응 자료로 활용될 수 있는 기록입니다. 삭제 후에는 복구가 어려울 수 있어요.</p>','<div class=grid2><button class=btn secondary onclick=closeOverlay()>취소</button><button class=btn danger onclick=&quot;closeOverlay();showToast(\'기록을 삭제했어요\');setRoute(\'records\')&quot;>삭제</button></div>')}

function writeDefaults(type, isEntry){
  if(isEntry){
    return {
      space:'현관',
      detail:'도어락',
      title:'현관 도어락 작동 오류',
      body:'도어락 비밀번호 입력 후 잠금/해제 반응이 불안정합니다. 입주 체크 중 확인한 내용으로 사진과 함께 기록합니다.',
      imageLabel:'도어락 사진'
    };
  }
  if(state.selectedSpace==='현관'){
    if(type==='수리'){
      return {
        space:'현관',
        detail:'도어락',
        title:'현관 도어락 작동 불량',
        body:'도어락 버튼 입력 후 잠금/해제 반응이 늦고 간헐적으로 오류음이 발생합니다. 사용 불편이 있어 수리 요청 기록으로 남깁니다.',
        imageLabel:'도어락 사진'
      };
    }
    return {
      space:'현관',
      detail:'현관문 하단',
      title:'현관문 하단 긁힘 및 찍힘',
      body:'현관문 하단 부분에 긁힘과 찍힘 자국이 확인됩니다. 입주/거주 중 상태 확인을 위해 사진과 함께 기록합니다.',
      imageLabel:'현관문 사진'
    };
  }
  if(state.selectedSpace==='거실/방'){
    return {
      space:'거실/방',
      detail:'벽면 모서리',
      title:type==='수리'?'거실 콘센트 접촉 불량':'거실 벽지 들뜸 현상',
      body:type==='수리'?'거실 콘센트에 플러그를 꽂았을 때 전원 연결이 불안정합니다. 수리 요청을 위해 기록합니다.':'거실 벽지 모서리가 들뜨고 일부 오염이 확인됩니다. 사진과 함께 상태를 기록합니다.',
      imageLabel:'거실/방 사진'
    };
  }
  return {
    space:'화장실',
    detail:type==='수리'?'세면대 배수구':'수도꼭지 연결부',
    title:type==='수리'?'화장실 세면대 배수 지연':'화장실 수도꼭지 누수',
    body:type==='수리'?'세면대 물이 천천히 빠져 사용이 불편합니다. 수리 요청을 위해 기록합니다.':'수도꼭지 연결부위에서 물이 떨어집니다. 사진과 함께 기록합니다.',
    imageLabel:'화장실 사진'
  };
}

  const isEntry = !!state.fromEntryMission;
  if(type!=='수리') state.writeStatus='미처리';

    <div class="label">이미지</div><div class="photo ${writePhotoClass(defaults,type,isEntry)}" style="height:160px" onclick="openPhotoSheet()"><span class="label">${defaults.imageLabel}</span></div>
    <div class="grid2"><div><div class="label">발생일</div><input class="field" value="2026.06.04"></div><div><div class="label">시간</div><input class="field" value="14:32"></div></div>
    <div class="label">공간</div><input class="field" value="${defaults.space}"><div class="label">세부위치</div><input class="field" value="${defaults.detail}"><div class="label">제목</div><input class="field" value="${defaults.title}"><div class="label">상세 내용</div><textarea class="field">${defaults.body}</textarea>
    ${type==='수리'?`<div class="label">처리 상태</div><div class="seg"><button class="${state.writeStatus==='미처리'?'active':''}" onclick="state.writeStatus='미처리';render()">미처리</button><button class="${state.writeStatus==='요청완료'?'active':''}" onclick="state.writeStatus='요청완료';render()">요청완료</button><button class="${state.writeStatus==='처리완료'?'active':''}" onclick="state.writeStatus='처리완료';render()">처리완료</button></div>`:''}
    <div style="height:18px"></div><div class="grid2"><button class="btn secondary" onclick="modal('작성을 취소할까요?','<p class=hint>임시저장하거나 작성 내용을 삭제할 수 있어요.</p>','<button class=btn secondary onclick=closeOverlay()>계속 작성</button><div style=height:8px></div><button class=btn onclick=&quot;closeOverlay();showToast(\'임시저장했어요\')&quot;>임시저장</button><div style=height:8px></div><button class=btn danger onclick=&quot;closeOverlay();historyBack()&quot;>삭제하고 나가기</button>')">취소</button><button class="btn" onclick="saveRecord()">${isEntry?'글 등록하기':'등록'}</button></div>
  `)
}
function saveRecord(){
  const id=records.length+1;
  const isEntry = !!state.fromEntryMission;
  const type = isEntry ? '수리' : (state.writeType||'하자');
  const defaults = writeDefaults(type,isEntry);
  const newRecord = {
    id,
    type,
    space:defaults.space,
    detailSpace:defaults.detail,
    title:defaults.title,
    desc:defaults.body,
    date:'2026.06.04',
    status:type==='수리'?(state.writeStatus||'미처리'):'미처리',
    severity:'중요',
    pin:null,
    imageClass: writePhotoClass(defaults,type,isEntry).replace('real-photo ','').trim()
  };
  if(isEntry) newRecord.status='미처리';
  state.pendingRecord = newRecord;
  state.pendingRecordIsEntry = isEntry;
  state.pendingPin = null;
  openDefectPinModal();
}
function openDefectPinModal(){
  const previewClass = state.pendingRecord && state.pendingRecord.type==='하자' ? ' blue' : '';
  $('modal').innerHTML = `<div class="dim" onclick="closeOverlay()"></div><div class="modal"><h3 class="h3" style="text-align:center;font-size:20px">위치를 사진 위에 클릭해 주세요.</h3><div class="pin-select-stage" onclick="selectDefectPin(event)"><div class="entry-photo-real real-photo entry-full-1"><span class="label"></span></div><div class="entry-photo-real real-photo entry-full-2"><span class="label"></span></div><span id="defectPinPreview" class="pin big${previewClass}" style="display:none">!</span></div><p class="pin-guide-copy">하자는 파란 핀, 수리는 빨간 핀으로 표시됩니다.</p><div style="height:14px"></div><button class="btn inline" style="display:block;margin:0 auto;width:120px" onclick="confirmDefectPin()">확인</button></div>`;
  $('modal').classList.add('on');
}
function selectDefectPin(event){
  const box = event.currentTarget.getBoundingClientRect();
  const x = Math.max(4, Math.min(96, ((event.clientX - box.left) / box.width) * 100));
  const y = Math.max(6, Math.min(94, ((event.clientY - box.top) / box.height) * 100));
  state.pendingPin = {x:Math.round(x), y:Math.round(y)};
  const pin = document.getElementById('defectPinPreview');
  if(pin){
    pin.style.display='grid';
    pin.style.left=state.pendingPin.x+'%';
    pin.style.top=state.pendingPin.y+'%';
  }
}
function confirmDefectPin(){
  if(!state.pendingPin){
    showToast('사진 위 하자 위치를 먼저 클릭해주세요');
    return;
  }
  const newRecord = state.pendingRecord;
  const isEntry = !!state.pendingRecordIsEntry;
  if(!newRecord){
    closeOverlay();
    return;
  }
  newRecord.pin = state.pendingPin;
  records.unshift(newRecord);
  state.selectedRecord = newRecord.id;
  if(isEntry){
    if(!state.entryPhotoPins) state.entryPhotoPins=[];
    state.entryPhotoPins.push({...state.pendingPin, type:newRecord.type});
    if(!state.entryMissionDone) state.entryMissionDone=[];
    if(!state.entryMissionDone.includes('도어락')) state.entryMissionDone.push('도어락');
    state.fromEntryMission=false;
    state.entryWritingMission=null;
    state.selectedSpace='현관';
    state.recordType='수리';
    const remainingAfterWrite = entryRemainingMissions();
    if(remainingAfterWrite.length===0){
      state.entryFlowStep='missionsDone';
      state.entryCompletionTimerStarted=false;
      state.checklistDone=100;
    }else{
      state.entryFlowStep='missions';
      state.entryCompletionTimerStarted=false;
      state.checklistDone=Math.max(state.checklistDone, Math.round(((entryAllMissions().length-remainingAfterWrite.length)/entryAllMissions().length)*100));
    }
    state.pendingRecord=null;
    state.pendingRecordIsEntry=false;
    state.pendingPin=null;
    closeOverlay();
    showToast('도어락 하자 위치와 기록을 등록했어요');
    setRoute('records');
    return;
  }
  if(newRecord.space==='현관'){
    if(!state.entryPhotoPins) state.entryPhotoPins=[];
    state.entryPhotoPins.push({...state.pendingPin, type:newRecord.type});
  }
  state.pendingRecord=null;
  state.pendingRecordIsEntry=false;
  state.pendingPin=null;
  closeOverlay();
  showToast('하자 위치와 기록이 등록되었어요');
  setRoute('recordDetail');
}
